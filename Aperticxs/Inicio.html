<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclutamiento - Apertix</title>
     <link rel="icon" type="image/png" href="../Aperticxs/images-removebg-preview.png">
    <style>
        /* Reseteo básico */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial Black', Impact, sans-serif;
            overflow: hidden; /* Que no salgan barras de desplazamiento */
            
            /* LA MAGIA DEL CORCHO TEXTURIZADO EN PURO CSS */
            background-color: #a67b5b; /* Color base arcilla/corcho */
            background-image: 
                /* 1. Viñeta: Oscurece los bordes para dar volumen y aspecto de foco central */
                radial-gradient(circle, transparent 40%, rgba(30, 15, 0, 0.7) 120%),
                /* 2. Ruido SVG inyectado: Crea el grano realista del corcho */
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.35'/%3E%3C/svg%3E");
        }

        .tablon-corcho {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Estilo base para todos los pósteres (Polaroids) --- */
        .poster-item {
            position: absolute;
            background-color: #f1f0e8; /* Borde blanco un poco envejecido */
            padding: 10px 10px 25px 10px;
            /* Sombra múltiple: una dura para contacto, otra suave para volumen */
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5), 10px 15px 25px rgba(0,0,0,0.3); 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), z-index 0s;
        }

        /* Efecto al pasar el ratón: El póster "salta" hacia ti */
        .poster-item:hover {
            transform: scale(1.15) rotate(0deg) translateY(-10px) !important;
            z-index: 100 !important; /* Se pone por encima de todos */
            cursor: pointer;
            box-shadow: 5px 15px 30px rgba(0,0,0,0.6);
        }

        .poster-item img {
            width: 100%;
            height: auto;
            display: block;
            /* Un filtro suave para unificar el color de todas vuestras fotos */
            filter: contrast(1.1) sepia(0.2); 
        }

        /* --- La Chincheta Roja 3D --- */
        .chincheta {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            /* Brillo esférico */
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc0000 60%, #660000);
            border-radius: 50%;
            box-shadow: 3px 5px 8px rgba(0,0,0,0.7), inset -2px -2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* La sombra del pinchito en el papel */
        .chincheta::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 8px;
            width: 2px;
            height: 12px;
            background: rgba(0,0,0,0.4);
            z-index: -1;
            transform: rotate(-20deg);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* --- POSICIONES MUY ESPARCIDAS (Tus 7 imágenes) --- */
        /* Empujadas a las esquinas y bordes para dejar el centro libre */
        /* --- POSICIONES AGRUPADAS (Más relleno en el centro) --- */
        
        /* Zona Izquierda */
        .p1 { top: 8%; left: 8%; width: 180px; transform: rotate(-10deg); z-index: 3; } 
        .p2 { top: 40%; left: 16%; width: 160px; transform: rotate(-5deg); z-index: 1; } /* Asoma por debajo */
        .p3 { bottom: 8%; left: 6%; width: 200px; transform: rotate(8deg); z-index: 4; } 
        
        /* Zona Centro-Izquierda (Casi tocando el cartel central) */
        .p4 { top: 12%; left: 28%; width: 170px; transform: rotate(-15deg); z-index: 2; } 
        
        /* Zona Derecha */
        .p5 { top: 6%; right: 8%; width: 210px; transform: rotate(4deg); z-index: 2; } 
        .p6 { bottom: 12%; right: 20%; width: 190px; transform: rotate(-12deg); z-index: 4; } 
        .p7 { bottom: 4%; right: 5%; width: 170px; transform: rotate(15deg); z-index: 1; } /* Asoma por detrás a la derecha */
        /* --- El Botón Central --- */
        .btn-centro {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fdf6e3;
            color: #1c1917;
            padding: 25px 60px;
            font-size: 4rem;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 3px;
            border: 3px solid #a8a29e;
            box-shadow: 8px 15px 35px rgba(0,0,0,0.8);
            z-index: 50; /* Siempre visible en el medio */
            text-align: center;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn-centro:hover {
            background-color: #ffffff;
            transform: translate(-50%, -50%) scale(1.05);
            color: #b91c1c;
            box-shadow: 12px 20px 40px rgba(0,0,0,0.9);
        }

        /* Chinchetas del cartel central */
        .pin-izq { left: 20px; top: 15px; }
        .pin-der { left: auto; right: 20px; top: 15px; transform: none; }
    </style>
</head>
<body>

    <div class="tablon-corcho">
        
        <div class="poster-item p1">
            <div class="chincheta"></div>
            <img src="./Arnau.png" alt="Poster 1">
        </div>

        <div class="poster-item p2">
            <div class="chincheta"></div>
            <img src="./Eric.png" alt="Poster 2">
        </div>

        <div class="poster-item p3">
            <div class="chincheta"></div>
            <img src="./Erik.jpeg" alt="Poster 3">
        </div>

        <div class="poster-item p4">
            <div class="chincheta"></div>
            <img src="../Aperticxs/Leonard.jpeg" alt="Poster 4">
        </div>

        <div class="poster-item p5">
            <div class="chincheta"></div>
            <img src="./Fran.jpeg" alt="Poster 5">
        </div>

        <div class="poster-item p6">
            <div class="chincheta"></div>
            <img src="./Mateo.png" alt="Poster 6">
        </div>

        <div class="poster-item p7">
            <div class="chincheta"></div>
            <img src="./Marc.png" alt="Poster 7">
        </div>

        <a href="index.html" class="btn-centro">
            <div class="chincheta pin-izq"></div>
            <div class="chincheta pin-der"></div>
            ÚNETE A<br>ROBÓTICA
        </a>

    </div>

</body>
</html>
