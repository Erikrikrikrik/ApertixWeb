<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Código QR de mi web</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <h2>Aquí está el QR de mi página:</h2>
    
    <div id="contenedor-qr"></div>

    <script>
        // Aquí generamos el QR
        new QRCode(document.getElementById("contenedor-qr"), {
            text: "https://www.tu-pagina-web.com", // <-- ¡Cambia esto por tu enlace!
            width: 200,  // Ancho del QR
            height: 200, // Alto del QR
            colorDark : "#000000",
            colorLight : "#ffffff",
        });
    </script>

</body>
</html>
